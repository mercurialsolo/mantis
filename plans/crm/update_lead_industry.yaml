name: update_lead_industry
description: Update the industry vertical for a qualified lead
url: https://staffai-test-crm.exe.xyz
require_session: true

inputs:
  lead_status:
    description: "Status filter for selecting the lead"
    default: "Qualified"
  industry_value:
    description: "New industry vertical value"
    required: true

steps:
  - action: click
    target: "Leads page link in the navigation menu"
    wait_for: url_changed

  - action: click
    target: "First lead row with '{{lead_status}}' status"

  - action: click
    target: "Edit Lead button or link"
    wait_for: url_changed

  - action: click
    target: "Industry Vertical dropdown or input field"
    wait_for: input_focused

  - action: type
    text: "{{industry_value}}"

  - action: click
    target: "'Update Lead' button"
    wait_for: url_changed

  - action: verify
    check: page_contains_text
    value: "{{industry_value}}"
