model_name: mantis-gemma4-cua-workload
base_image:
  image: pytorch/pytorch:2.7.0-cuda12.8-cudnn9-devel
build_commands:
  - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git build-essential cmake curl wget gnupg xvfb xdotool scrot ca-certificates fonts-liberation fonts-noto-color-emoji libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libpango-1.0-0 libcairo2 libasound2 libxshmfence1
  - curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
  - echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main' > /etc/apt/sources.list.d/google-chrome.list
  - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y google-chrome-stable
  - git clone --depth 1 --branch baseten-support https://github.com/mercurialsolo/cua-agent.git /workspace/cua-agent
  - cd /workspace/cua-agent && pip install --no-cache-dir -e . openai requests pillow mss huggingface-hub fastapi uvicorn pydantic
  - git clone --depth 1 https://github.com/ggerganov/llama.cpp /opt/llama.cpp
  - ln -sf /usr/local/cuda/lib64/stubs/libcuda.so /usr/lib/x86_64-linux-gnu/libcuda.so.1 && ldconfig
  - cd /opt/llama.cpp && cmake -B build -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES="80;90" -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_SERVER=ON && cmake --build build --target llama-server --config Release -j$(nproc)
docker_server:
  start_command: bash -lc "cd /workspace/cua-agent && MANTIS_MODEL=gemma4-cua MANTIS_LLAMA_PORT=18080 MANTIS_DATA_DIR=/workspace/mantis-data uvicorn mantis_agent.baseten_server:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 300"
  server_port: 8000
  predict_endpoint: /predict
  readiness_endpoint: /health
  liveness_endpoint: /health
resources:
  instance_type: "A100:12x144"
runtime:
  predict_concurrency: 1
  health_checks:
    startup_threshold_seconds: 3000
    stop_traffic_threshold_seconds: 1800
    restart_threshold_seconds: 1800
weights:
  - source: "hf://ggml-org/gemma-4-E4B-it-GGUF@main"
    mount_location: "/models/gemma4"
    allow_patterns:
      - "gemma-4-e4b-it-Q4_K_M.gguf"
      - "mmproj-gemma-4-e4b-it-f16.gguf"
secrets:
  anthropic_api_key: null
  proxy_url: null
  proxy_user: null
  proxy_pass: null
