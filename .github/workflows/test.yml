name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install ffmpeg
        # tests/test_recorder.py + tests/test_presentation.py shell out to
        # ffmpeg. Without it on PATH the tests fail with "ffmpeg-not-installed".
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dev + server extras (locked)
        # `uv sync` installs the exact versions from uv.lock — same resolution
        # locally and in CI, no surprise minor-version drift.
        run: uv sync --python ${{ matrix.python-version }} --extra dev --extra server --extra orchestrator --extra metrics

      - name: Run pytest
        run: uv run pytest tests/ -q

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv tool install "ruff>=0.4"
      - name: Lint
        run: ruff check .

  mkdocs-strict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install docs deps (locked)
        run: uv sync --extra docs
      - name: Build site (strict)
        run: uv run mkdocs build --strict --site-dir /tmp/site
