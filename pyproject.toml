[project]
name = "cua-agent"
version = "0.1.0"
description = "Streaming CUA agent powered by Gemma4 — unified perception, reasoning, and action"
requires-python = ">=3.11"
dependencies = [
    "transformers>=4.52",
    "torch>=2.1",
    "mss>=9.0",
    "pyautogui>=0.9",
    "pillow>=10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]
gpu = [
    "accelerate>=0.30",
    "bitsandbytes>=0.43",
]
hud = [
    "hud-python>=0.5.34",
    "openai>=1.0",
    "modal>=0.73",
]

[project.scripts]
cua = "cua_agent.main:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
