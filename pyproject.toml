[project]
name = "mantis-agent"
version = "0.1.0"
description = "Mantis — a small creature with world-class vision that watches patiently and acts with speed and precision"
requires-python = ">=3.11"
dependencies = [
    "transformers>=4.52",
    "torch>=2.1",
    "mss>=9.0",
    "pyautogui>=0.9",
    "pillow>=10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]
gpu = [
    "accelerate>=0.30",
    "bitsandbytes>=0.43",
]
hud = [
    "hud-python>=0.5.34",
    "openai>=1.0",
    "modal>=0.73",
]
viewer = [
    "fastapi>=0.100",
    "uvicorn>=0.20",
]

[project.scripts]
mantis = "mantis_agent.main:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "OSWorld",
    "VWA_configs",
    "screenshots",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.pytest.ini_options]
norecursedirs = [
    ".claude",
    "OSWorld",
    "VWA_configs",
    "screenshots",
]
