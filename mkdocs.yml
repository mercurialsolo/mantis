site_name: Mantis CUA
site_description: A unified perception-reasoning-action agent for computer use, hostable on Baseten / Modal / EKS / GKE.
site_url: https://mercurialsolo.github.io/mantis/
repo_url: https://github.com/mercurialsolo/mantis
repo_name: mercurialsolo/mantis
edit_uri: edit/main/docs/

# Source files all live under docs/. Existing top-level docs (api.md,
# architecture.md, learnings.md) stay where they are so direct-link-from-GitHub
# keeps working; the nav below re-surfaces them under friendlier names.
# Client-specific docs live in a separate directory and are NOT part of
# this site — see the README at the repo root for the policy.
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mercurialsolo/mantis

nav:
  - Home: index.md
  - Getting started:
      - getting-started/index.md
      - Quickstart: getting-started/quickstart.md
      - Use cases: getting-started/use-cases.md
      - Concepts: getting-started/concepts.md
      - Plan formats: getting-started/plan-formats.md
      - CLI: getting-started/cli.md
  - Hosting:
      - hosting/index.md
      - Baseten: hosting/baseten.md
      - Modal: hosting/modal.md
      - AWS (EKS): hosting/aws.md
      - GKE: hosting/gke.md
      - Local (Docker): hosting/local.md
  - Client:
      - client/index.md
      - Authentication: client/auth.md
      - Sending plans: client/plans.md
      - Pure CUA mode: client/pure-cua.md
      - Runs and polling: client/runs-and-polling.md
      - Recordings: client/recordings.md
      - Errors: client/errors.md
  - Operations:
      - operations/index.md
      - Tenant keys: operations/tenant-keys.md
      - Rate limits: operations/rate-limits.md
      - Idempotency: operations/idempotency.md
      - Webhooks: operations/webhooks.md
      - URL allowlist: operations/allowlist.md
      - Metrics: operations/metrics.md
      - Cost model: operations/cost.md
      - Wall-time aggregation: operations/wall-time-aggregation.md
      - Continual fine-tuning: operations/continual-finetuning.md
      - Model promotion: operations/model-promotion.md
      - Independent grounding: operations/independent-grounding.md
  - Integrations:
      - integrations/index.md
      - Generic CUA over HTTP: integrations/generic-cua.md
      - Recipes (jobs, e-commerce, news, real-estate): integrations/recipes.md
      - Embedding MicroPlanRunner: integrations/embedding-microplanrunner.md
      - Integrating any agent: integrations/any-agent.md
  - Reference:
      - reference/index.md
      - HTTP API: api.md
      - Architecture: architecture.md
      - Environment variables: reference/env-vars.md
      - Glossary: reference/glossary.md
      - Coordinate spaces: reference/coordinate-spaces.md
      - Predicate grammar: reference/predicates.md
      - Done-acceptance gate: reference/done-gate.md
      - Form controller: reference/form-controller.md
      - Adaptive settle: reference/adaptive-settle.md
      - Chrome session reuse: reference/chrome-session-reuse.md
      - Speculative inference: reference/speculative-inference.md
      - Perceptual diff verifier: reference/perceptual-diff.md
      - Loop recovery policy: reference/loop-recovery.md
      - Adaptive loop windows: reference/adaptive-loop-windows.md
      - Adaptive click tolerance: reference/adaptive-click-tol.md
      - Ablation harness: reference/ablation-harness.md
  - Appendix:
      - appendix/index.md
      - Learnings: learnings.md
