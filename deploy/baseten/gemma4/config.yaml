model_name: "model:gemma-4-31B-it preset:latency"
base_image:
  image: vllm/vllm-openai:nightly-b075604da10a9e8ff23d23f63d5113d43f0e4208
model_metadata:
  repo_id: RedHatAI/gemma-4-31B-it-FP8-block
  example_model_input:
    model: google/gemma-4-31B-it
    messages:
      - role: user
        content:
          - type: text
            text: "Describe this image in one sentence."
          - type: image_url
            image_url:
              url: "https://picsum.photos/id/237/200/300"
    stream: true
    max_tokens: 512
    temperature: 1.0
  tags:
    - openai-compatible
weights:
  - source: "hf://RedHatAI/gemma-4-31B-it-FP8-block@main"
    mount_location: "/app/checkpoint/gemma"
    auth_secret_name: "hf_access_token"
docker_server:
  start_command: >-
    sh -c "export HF_TOKEN=$(cat /secrets/hf_access_token 2>/dev/null || true); export HUGGING_FACE_HUB_TOKEN=$HF_TOKEN; GPU_COUNT=$(nvidia-smi --list-gpus | wc -l) && vllm serve /app/checkpoint/gemma
    --tensor-parallel-size $GPU_COUNT
    --served-model-name google/gemma-4-31B-it
    --max-num-seqs 16
    --max-model-len auto
    --limit-mm-per-prompt '{\"image\": 1}'
    --gpu-memory-utilization 0.9
    --speculative-config '{\"model\":\"RedHatAI/gemma-4-31B-it-speculator.eagle3\",\"num_speculative_tokens\":3,\"method\":\"eagle3\"}'
    --trust-remote-code
    --enable-auto-tool-choice
    --reasoning-parser gemma4
    --tool-call-parser gemma4"
  readiness_endpoint: /health
  liveness_endpoint: /health
  predict_endpoint: /v1/chat/completions
  server_port: 8000
environment_variables:
  VLLM_LOGGING_LEVEL: INFO
  HF_HUB_ENABLE_HF_TRANSFER: "1"
requirements:
  - "transformers @ https://github.com/huggingface/transformers/archive/aa935fb53dc38b56f10cc86b3a74354c2e99412f.zip"  # v5.6.2
  - huggingface_hub
  - hf_transfer
  - datasets
resources:
  accelerator: H100:2
  use_gpu: true
secrets:
  hf_access_token: null
runtime:
  health_checks:
    restart_check_delay_seconds: 300
    restart_threshold_seconds: 300
    stop_traffic_threshold_seconds: 120
  predict_concurrency: 8
