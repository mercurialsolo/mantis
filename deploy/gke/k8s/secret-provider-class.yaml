# Maps Secret Manager → an in-pod tmpfs mount → env via Deployment envFrom.
# Requires the Secret Manager CSI driver:
#   https://github.com/GoogleCloudPlatform/secrets-store-csi-driver-provider-gcp

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mantis-holo3-secrets
  namespace: default
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/REPLACE_PROJECT/secrets/mantis-prod-anthropic_api_key/versions/latest"
        path: "anthropic_api_key"
      - resourceName: "projects/REPLACE_PROJECT/secrets/mantis-prod-proxy_url/versions/latest"
        path: "proxy_url"
      - resourceName: "projects/REPLACE_PROJECT/secrets/mantis-prod-proxy_user/versions/latest"
        path: "proxy_user"
      - resourceName: "projects/REPLACE_PROJECT/secrets/mantis-prod-proxy_pass/versions/latest"
        path: "proxy_pass"
      - resourceName: "projects/REPLACE_PROJECT/secrets/mantis-prod-mantis_api_token/versions/latest"
        path: "mantis_api_token"
  secretObjects:
    - secretName: mantis-holo3-secrets
      type: Opaque
      data:
        - { objectName: anthropic_api_key, key: ANTHROPIC_API_KEY }
        - { objectName: proxy_url,         key: PROXY_URL }
        - { objectName: proxy_user,        key: PROXY_USER }
        - { objectName: proxy_pass,        key: PROXY_PASS }
        - { objectName: mantis_api_token,  key: MANTIS_API_TOKEN }
