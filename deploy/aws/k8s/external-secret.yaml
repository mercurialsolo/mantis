# Maps Secrets Manager entries → a k8s Secret consumed by the Deployment.
# Requires External Secrets Operator (https://external-secrets.io/) installed.

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: mantis-aws-secrets
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          # IRSA — annotate the SA with eks.amazonaws.com/role-arn = <app_role_arn output>
          serviceAccountRef:
            name: mantis-holo3-server
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mantis-holo3-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: mantis-aws-secrets
    kind: SecretStore
  target:
    name: mantis-holo3-secrets
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef: { key: mantis-prod/anthropic_api_key }
    - secretKey: PROXY_URL
      remoteRef: { key: mantis-prod/proxy_url }
    - secretKey: PROXY_USER
      remoteRef: { key: mantis-prod/proxy_user }
    - secretKey: PROXY_PASS
      remoteRef: { key: mantis-prod/proxy_pass }
    - secretKey: MANTIS_API_TOKEN
      remoteRef: { key: mantis-prod/mantis_api_token }
